<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="https://i.postimg.cc/qvjz8QFW/Logo.png" />
    <title>Happy birthday 🎂🎂🎂</title>
    <style>
@import url('https://fonts.googleapis.com/css2?family=Coiny&family=Titan+One&display=swap');
@import url('https://fonts.googleapis.com/css2?family=Nerko+One&family=Sriracha&display=swap');
@import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&display=swap');

* {
    padding: 0;
    margin: 0;
    box-sizing: border-box;
}

/* Transition Overlay for Screen Darkening */
#transition-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    background-color: #000;
    opacity: 0;
    visibility: hidden;
    z-index: 99999; /* Higher than gift-overlay (10000) */
    transition: opacity 1.5s ease-in-out, visibility 1.5s;
    pointer-events: none;
}

#transition-overlay.active {
    opacity: 1;
    visibility: visible;
    pointer-events: all;
}

/* Gift Box Initial Overlay */
#gift-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    background: radial-gradient(circle at center, #302b63 0%, #070719 100%);
    z-index: 10000;
    display: flex;
    justify-content: center;
    align-items: center;
    transition: opacity 1.2s cubic-bezier(0.4, 0, 0.2, 1), visibility 1.2s;
}

#gift-overlay.hidden {
    opacity: 0;
    visibility: hidden;
    pointer-events: none;
}

.gift-box-container {
    text-align: center;
    perspective: 1000px;
}

.gift-box {
    font-size: 8rem;
    margin: 0 auto 20px;
    cursor: pointer;
    display: inline-block;
    animation: giftBob 1.5s infinite ease-in-out;
    transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    user-select: none;
}

.gift-box:hover {
    transform: scale(1.15);
}

.gift-box:active {
    transform: scale(0.85);
}

.gift-text {
    font-family: "Coiny", system-ui;
    font-weight: 400;
    font-style: normal;
    font-size: 2.2rem;
    background: linear-gradient(135deg, #06b6d4, #a855f7, #06b6d4);
    background-size: 200% 100%;
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    font-weight: bold;
    filter: drop-shadow(0 0 10px rgba(168, 85, 247, 0.4));
    animation: textPulse 2.5s infinite ease-in-out, bgMove 5s linear infinite;
    letter-spacing: 1px;
}

@keyframes bgMove {
    0% { background-position: 0% 50%; }
    100% { background-position: 200% 50%; }
}

@keyframes giftBob {

    0%,
    100% {
        transform: translateY(0) rotate(0);
    }

    50% {
        transform: translateY(-20px) rotate(2deg);
    }
}

@keyframes textPulse {

    0%,
    100% {
        opacity: 0.7;
        transform: scale(1);
    }

    50% {
        opacity: 1;
        transform: scale(1.05);
    }
}


/* Star Falling Effect */
#star-container {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 5;
    /* Behind the content but above background */
    overflow: hidden;
}

.falling-star {
    position: absolute;
    top: -50px;
    pointer-events: none;
    z-index: 5;
    animation-name: starFall;
    animation-timing-function: linear;
    animation-iteration-count: infinite;
}

@keyframes starFall {
    0% {
        transform: translateY(0) rotate(0deg);
        opacity: 0;
    }

    10% {
        opacity: 1;
    }

    90% {
        opacity: 1;
    }

    100% {
        transform: translateY(110vh) rotate(720deg);
        opacity: 0;
    }
}

:root {
    --color-pink: #0a0010; /* Dark space background */
    --color-white: #f8fafc; /* Crisp white */
    --color-black: #e2e8f0; /* Soft contrast */
    --color-text-pink: #06b6d4; /* Galaxy Cyan */
    --color-heart: #a855f7; /* Cosmic Purple */
    --color-bg-letter: #1e1b4b; /* Deep Indigo */
    --color-border: #8b5cf6; /* Vivid Violet */
}

html {
    height: 100%;
}

body {
    position: relative;
    font-size: 16px;
    margin: 0;
    padding: 0;
    min-height: 100vh;
    background-color: #050510; /* Vực thẳm không gian đen tuyền */
    background-image:
        radial-gradient(circle at 20% 40%, rgba(139, 92, 246, 0.15) 0%, transparent 60%), /* Tinh vân xanh tím */
        radial-gradient(circle at 80% 60%, rgba(37, 99, 235, 0.15) 0%, transparent 60%),  /* Tinh vân xanh lam sáng */
        radial-gradient(circle at 60% 10%, rgba(76, 29, 149, 0.15) 0%, transparent 50%),   /* Đốm mây tím thẫm */
        radial-gradient(circle at 40% 90%, rgba(30, 58, 138, 0.2) 0%, transparent 60%);   /* Dải xanh đậm đại dương */
    background-attachment: fixed;
}

#wrapper {
    position: relative;
    background-color: transparent;
    background-image: linear-gradient(0deg, transparent 24%, rgba(255, 110, 181, 0.05) 25%, rgba(255, 110, 181, 0.05) 26%, transparent 27%, transparent 74%, rgba(255, 110, 181, 0.05) 75%, rgba(255, 110, 181, 0.05) 76%, transparent 77%, transparent), linear-gradient(90deg, transparent 24%, rgba(255, 110, 181, 0.05) 25%, rgba(255, 110, 181, 0.05) 26%, transparent 27%, transparent 74%, rgba(255, 110, 181, 0.05) 75%, rgba(255, 110, 181, 0.05) 76%, transparent 77%, transparent);
    height: 100%;
    background-size: 80px 80px;
    overflow: hidden;
    z-index: 1;
}

#btn__start_container {
    display: flex;
    justify-content: center;
    margin-top: 20px;
    opacity: 0;
    visibility: hidden;
    transition: all 0.5s ease;
}

#btn__start_container.show {
    opacity: 1;
    visibility: visible;
}

#btn__start {
    background: linear-gradient(135deg, #c084fc, #ff6eb5);
    color: #fff;
    border: 2px solid rgba(255, 255, 255, 0.8);
    padding: 12px 45px;
    font-size: 1.6rem;
    font-weight: bold;
    border-radius: 50px;
    cursor: pointer;
    box-shadow:
        0 6px 0 #9333ea,
        0 12px 25px rgba(255, 110, 181, 0.4),
        inset 0 1px 1px rgba(255, 255, 255, 0.5);
    transition: all 0.1s ease;
    animation: floatingStart 3s ease-in-out infinite;
    position: relative;
    top: 0;
    text-shadow: 1px 2px 2px rgba(0, 0, 0, 0.2);
    display: flex;
    align-items: center;
    gap: 10px;
}

#btn__start:hover {
    background: linear-gradient(135deg, #d8b4fe, #ff9cd1);
    box-shadow:
        0 8px 0 #9333ea,
        0 15px 30px rgba(255, 110, 181, 0.5),
        inset 0 1px 1px rgba(255, 255, 255, 0.6);
    transform: translateY(-2px);
}

#btn__start:active {
    transform: translateY(6px);
    box-shadow:
        0 0 0 #9333ea,
        0 4px 10px rgba(255, 110, 181, 0.3),
        inset 0 2px 4px rgba(0, 0, 0, 0.2);
}

@keyframes floatingStart {

    0%,
    100% {
        transform: translateY(0);
    }

    50% {
        transform: translateY(-10px);
    }
}

#image-jump-container {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 300;
    overflow: hidden;
}

.jumping-image {
    position: absolute;
    bottom: -200px;
    width: 150px;
    height: 150px;
    object-fit: cover;
    border: 5px solid #fff;
    border-radius: 15px;
    box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
    z-index: 301;
    transition: transform 0.1s linear;
}

@keyframes jumpAnimation {
    0% {
        bottom: -200px;
        left: var(--start-x);
        transform: rotate(0deg) scale(0.5);
    }

    30% {
        transform: rotate(var(--mid-rot)) scale(1.1);
    }

    100% {
        bottom: 120%;
        left: var(--end-x);
        transform: rotate(var(--end-rot)) scale(1);
    }
}



.content {
    width: 100%;
    min-height: 100vh;
    position: relative;
    display: grid;
    grid-template-columns: 40% 60%;
    grid-template-areas:
        "left right"
        "btn right";
    justify-content: center;
    align-items: center;
    padding: 2rem 5%;
}

.content .left {
    grid-area: left;
    width: 100%;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
}

.content .right {
    grid-area: right;
    width: 100%;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
}

.content .btn {
    grid-area: btn;
    width: 100%;
    display: flex;
    justify-content: center;
    align-items: flex-start;
}


.btn {
    transform: scale(0);
}

.started .btn {
    animation: scalePop 2s 8s forwards ease-in-out;
}

.btn__floating {
    animation: floating 3s infinite ease-in-out;
}

#btn__letter {
    position: relative;
    margin-top: 30px;
    background-color: var(--color-text-pink);
    outline: none;
    padding: 12px 30px;
    font-size: 1.3rem;
    border-radius: 50px;
    border: 3px solid var(--color-border);
    font-family: "Sriracha", cursive;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    z-index: 2;
    transition: all .2s ease;
    box-shadow: 0 6px 0 var(--color-border);
    color: white;
}

@keyframes floating {

    0%,
    100% {
        transform: translateY(0);
    }

    50% {
        transform: translateY(-15px);
    }
}

#btn__letter:hover {
    background-color: var(--color-heart);
    color: #fff;
    transform: translateY(-2px);
    box-shadow: 0 8px 0 var(--color-border);
}

#btn__letter:active {
    transform: translateY(4px);
    box-shadow: 0 2px 0 var(--color-border);
}

#btn__letter i {
    margin-left: 5px;
}

#btn__letter:hover {
    border-color: var(--color-heart);
    background-color: var(--color-heart);
    color: #fff;
    box-shadow: rgba(0, 0, 0, 0.24) 0px 3px 8px;
}

#btn__letter:hover i {
    animation: rotateHeart 1s infinite linear;
}

@keyframes rotateHeart {

    0%,
    50%,
    100% {
        transform: rotate(0deg);
    }

    25% {
        transform: rotate(12deg);
    }

    75% {
        transform: rotate(-12deg);
    }
}

.title {
    position: relative;
    width: 100%;
    display: flex;
    justify-content: center;
    font-family: "Titan One", sans-serif;
    font-size: 3rem;
    flex-direction: column;
    perspective: 1000px;
}

.title .happy,
.title .birthday {
    position: relative;
    font-weight: bold;
    display: flex;
    justify-content: center;
}

.title .happy {
    color: var(--color-white);
    text-shadow: 4px 4px #7e22ce,
        -4px 4px #7e22ce,
        4px -4px #7e22ce,
        -4px -4px #7e22ce,
        4px 8px 0 #4c1d95;
}

.title .birthday {
    color: var(--color-text-pink);
    text-shadow: 4px 4px #1e3a8a,
        -4px 4px #1e3a8a,
        4px -4px #1e3a8a,
        -4px -4px #1e3a8a,
        4px 8px 0 #172554;
}

.title .happy span,
.title .birthday span {
    transform: translateY(50px);
    opacity: 0;
    visibility: hidden;
}

.started .title .happy span,
.started .title .birthday span {
    animation: txtTranslateY .5s var(--t) forwards;
}

@keyframes txtTranslateY {
    100% {
        transform: translateY(0);
        opacity: 1;
        visibility: visible;
    }
}

.title .birthday {
    color: var(--color-text-pink);
}

.title .hat {
    position: absolute;
    right: -80px;
    top: -400px;
    transform: rotate(-40deg);
    z-index: -1;
}

.started .title .hat {
    animation: topHat 4s 7s forwards ease;
}

@keyframes topHat {

    20%,
    30% {
        top: -30px;
        transform-origin: left;
        transform: rotate(-40deg);
    }

    35%,
    100% {
        top: -30px;
        transform: rotate(0deg);
    }
}

.date__of__birth,
.name {
    display: flex;
    justify-content: space-around;
    align-items: center;
    background-color: var(--color-text-pink);
    border-radius: 50px;
    margin-top: 20px;
    font-family: "Sriracha", cursive;
    width: 400px;
}

.date__of__birth {
    border: 3px solid var(--color-border);
    position: relative;
    transform: translateY(-100px);
    z-index: -1;
    opacity: 0;
    visibility: hidden;
    width: 0px;
}

.started .date__of__birth {
    animation: dateOfBirth 5s 9s forwards;
}

@keyframes dateOfBirth {

    20%,
    40% {
        width: 0px;
        height: 0;
        transform: translateY(0px);
        opacity: 1;
        visibility: visible;
    }

    45% {
        transform: translateY(0px);
        opacity: 1;
        visibility: visible;
        width: 300px;
        height: 0px;
    }

    50%,
    100% {
        transform: translateY(0px);
        opacity: 1;
        visibility: visible;
        width: 300px;
        height: 50px;
    }
}

.name {
    position: absolute;
    padding: 0px 40px;
    bottom: -20px;
    border: 3px solid var(--color-border);
}

.date__of__birth span,
.name span {
    font-weight: bold;
    margin: 0px 40px;
}

.date__of__birth span {
    font-size: 1.2rem;
}

.name span {
    font-size: 1.5rem;
}

.right .box__account {
    position: relative;
    transform: translateY(700px);
}

.started .right .box__account {
    animation: topBoxImage 8s 7s forwards ease-in;
}

@keyframes topBoxImage {
    to {
        transform: translateY(0);
    }
}

.content .right .image {
    position: relative;
    width: 400px;
    height: 400px;
    border-radius: 50%;
    overflow: hidden;
    display: flex;
    align-items: center;
    border: 6px solid var(--color-border);
    background-color: #fff;
    box-shadow: 0 0 30px rgba(139, 92, 246, 0.4), inset 0 0 20px rgba(6, 182, 212, 0.3);
}

.content .right .image img {
    position: absolute;
    width: 100%;
    height: 100%;
    object-fit: cover;
    opacity: 0;
    transition: opacity 1s ease-in-out, transform 1s ease-in-out;
}

.content .right .image img.active {
    opacity: 1;
    transform: scale(1.05);
}

@keyframes scalePop {
    0% {
        transform: scale(0);
    }

    10% {
        transform: scale(1.3);
    }

    20% {
        transform: scale(0.7);
    }

    30%,
    100% {
        transform: scale(1);
    }

}

@keyframes scaleHeartLetter {
    0% {
        transform: scale(0);
    }

    30% {
        transform: scale(1.2);
    }

    100% {
        transform: scale(1);
    }
}


.fa-heart {
    color: var(--color-heart);
    filter: drop-shadow(0 0 3px var(--color-heart));
    animation: scaleHeart 1s infinite linear;
}


@keyframes scaleHeart {
    50% {
        transform: scale(1.2);
    }
}

.right .balloon_one {
    position: absolute;
    top: -70px;
    left: -210px;
    animation: balloon1 2s infinite linear;
    transform: rotate(-20deg);
}

@keyframes balloon1 {

    0%,
    50%,
    100% {
        transform-origin: bottom right;
        transform: rotate(0deg);
    }

    25% {
        transform-origin: bottom right;
        transform: rotate(5deg);
    }

    75% {
        transform-origin: bottom right;
        transform: rotate(-5deg);
    }
}

.right .balloon_two {
    position: absolute;
    top: 25px;
    right: -150px;
    z-index: -1;
    transform: rotate(20deg);
    animation: balloon2 2s infinite linear;
}

@keyframes balloon2 {

    0%,
    50%,
    100% {
        transform-origin: bottom left;
        transform: rotate(10deg);
    }

    25% {
        transform-origin: bottom left;
        transform: rotate(7deg);
    }

    75% {
        transform-origin: bottom left;
        transform: rotate(13deg);
    }
}

.decorate_star {
    position: absolute;
    transform: scale(0);
    background-color: var(--color-black);
    clip-path: polygon(0 50%, 35% 35%, 50% 0, 65% 35%, 100% 50%, 65% 65%, 50% 100%, 35% 65%);
}

.started .decorate_star {
    animation: scalePop 3s var(--t) forwards,
        scaleStar 2s 16s infinite ease-in-out;
}

.decorate_star.star1 {
    width: 20px;
    height: 20px;
    top: 75px;
    left: 300px;
}

.decorate_star.star2 {
    width: 15px;
    height: 20px;
    top: 35px;
    right: 360px;
}

.decorate_star.star3 {
    width: 14px;
    height: 14px;
    top: 290px;
    left: 630px;
}

.decorate_star.star4 {
    width: 18px;
    height: 18px;
    bottom: 60px;
    left: 35px;
}

.decorate_star.star5 {
    width: 16px;
    height: 18px;
    bottom: 140px;
    left: 500px;
}

@keyframes scaleStar {
    25% {
        transform: scale(0.8);
    }

    50% {
        transform: scale(1.1);
    }
}

.decorate_bottom {
    position: absolute;
    right: 0;
    bottom: -10px;
}

.decorate_flower--one {
    position: absolute;
    top: 250px;
    left: 50px;
    transform: scale(0);
}

.started .decorate_flower--one {
    animation: scalePop 3s var(--t) forwards ease-in-out;
}

.decorate_flower--two {
    position: absolute;
    top: 225px;
    left: 540px;
    transform: scale(0);
}

.started .decorate_flower--two {
    animation: scalePop 3s var(--t) forwards ease-in-out;
}

.decorate_flower--three {
    position: absolute;
    top: 150px;
    right: 235px;
    transform: scale(0);
}

.started .decorate_flower--three {
    animation: scalePop 3s var(--t) forwards ease-in-out;
}

.funny_icon {
    position: absolute;
    bottom: 180px;
    left: 555px;
    transform: scale(0);
}

.started .funny_icon {
    animation: scalePop 3s 15s forwards ease-in-out;
}


#fireworks {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 150;
    display: none;
}

.box__letter {
    position: fixed;
    top: 0;
    left: 0;
    background-color: rgba(0, 0, 0, .5);
    width: 100%;
    height: 100%;
    z-index: 200;
    display: none;
}

.box__letter .letter__border {
    position: absolute;
    width: 65vw;
    height: 520px;
    background-color: #fff;
    border-radius: 15px;
    padding: 20px;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3), 0 0 0 10px rgba(255, 255, 255, 0.1);
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    display: none;
    border: 2px solid var(--color-border);
    background-image:
        linear-gradient(45deg, var(--color-border) 25%, transparent 25%),
        linear-gradient(-45deg, var(--color-border) 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, var(--color-border) 75%),
        linear-gradient(-45deg, transparent 75%, var(--color-border) 75%);
    background-size: 20px 20px;
    background-position: 0 0, 0 10px, 10px 10px, 10px 0;
}

.letter__border .close {
    position: absolute;
    right: -10px;
    top: -10px;
    width: 30px;
    height: 30px;
    background-color: var(--color-white);
    border-radius: 50%;
    display: flex;
    justify-content: center;
    align-items: center;
    box-shadow: rgba(99, 99, 99, 0.2) 0px 2px 8px 0px;
    cursor: pointer;
    color: red;
}

.letter__border .letter {
    width: 100%;
    height: 100%;
    background-color: #fffef0;
    background-image: radial-gradient(#d4af37 0.5px, transparent 0.5px);
    background-size: 20px 20px;
    border-radius: 10px;
    padding: 30px;
    position: relative;
    overflow: hidden;
    border: 1px solid #e0d5a0;
}

.letter::before {
    content: '';
    position: absolute;
    top: 10px;
    left: 10px;
    right: 10px;
    bottom: 10px;
    border: 4px double var(--color-border);
    border-radius: 5px;
    pointer-events: none;
}

.letter__border .letter .title__letter {
    text-align: center;
    font-family: 'Dancing Script', cursive;
    font-weight: bold;
    font-size: 2.8rem;
    color: #8b4513;
    margin-bottom: 10px;
    position: relative;
    z-index: 1;
    text-shadow: 1px 1px 0 rgba(255, 255, 255, 0.5);
}

/* Wax Seal Decor */
.title__letter::after {
    position: absolute;
    bottom: -15px;
    left: 50%;
    transform: translateX(-50%);
    width: 35px;
    height: 35px;
    background: #a52a2a;
    color: white;
    border-radius: 50%;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 1.2rem;
    box-shadow: 0 2px 5px rgba(0, 0, 0, 0.3), inset 0 0 5px rgba(0, 0, 0, 0.5);
    border: 2px solid #800000;
}

.title__letter .fa-solid {
    margin-left: 5px;
    font-size: 1.3rem;
}

.letter__border .letter .content__letter {
    position: relative;
    width: 100%;
    height: calc(100% - 70px);
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 0px 20px 40px 20px;
    overflow-y: auto;
    scrollbar-width: none;
    -ms-overflow-style: none;
}

.letter__border .letter .content__letter::-webkit-scrollbar {
    display: none;
}

@keyframes opacityHeart {
    to {
        opacity: 1;
    }
}

.content__letter .love__img {
    opacity: 0;
    margin-bottom: 5px;
    /* Reduced from 10px */

class Rocket {
    constructor() {
        this.x = Math.random() * canvas.width;
        this.y = canvas.height;
        this.targetY = Math.random() * (canvas.height / 2);
        this.color = `hsl(${Math.random() * 360}, 100%, 50%)`;
        this.velocity = {
            x: (Math.random() - 0.5) * 2,
            y: - (Math.random() * 3 + 7)
        };
        this.alive = true;
    }

    draw() {
        ctx.beginPath();
        ctx.arc(this.x, this.y, 3, 0, Math.PI * 2);
        ctx.fillStyle = this.color;
        ctx.fill();
    }

    update() {
        this.x += this.velocity.x;
        this.y += this.velocity.y;
        if (this.y <= this.targetY) {
            this.alive = false;
            explode(this.x, this.y);
        }
    }
}

class Particle {
    constructor(x, y, color, velocity) {
        this.x = x;
        this.y = y;
        this.color = color;
        this.velocity = velocity;
        this.alpha = 1;
        this.friction = 0.96; // Slightly less friction for longer spread
        this.gravity = 0.15;
    }

    draw() {
        ctx.save();
        ctx.globalAlpha = this.alpha;
        ctx.beginPath();
        ctx.arc(this.x, this.y, 2.5, 0, Math.PI * 2);
        ctx.fillStyle = this.color;
        ctx.shadowBlur = 10;
        ctx.shadowColor = this.color;
        ctx.fill();
        ctx.restore();
    }

    update() {
        this.velocity.x *= this.friction;
        this.velocity.y *= this.friction;
        this.velocity.y += this.gravity;
        this.x += this.velocity.x;
        this.y += this.velocity.y;
        this.alpha -= 0.012; // Slower fade for larger radius
    }
}

function explode(x, y) {
    const count = 120;
    const baseHue = Math.random() * 360;

    for (let i = 0; i < count; i++) {
        const hue = (baseHue + Math.random() * 100) % 360;
        const color = `hsl(${hue}, 100%, 60%)`;
        const angle = Math.random() * Math.PI * 2;
        const speed = Math.random() * 15 + 2; // Up to 17 initial velocity

        const velocity = {
            x: Math.cos(angle) * speed,
            y: Math.sin(angle) * speed
        };

        particles.push(new Particle(x, y, color, velocity));
    }
}

function animateFireworks() {
    if (document.getElementById('fireworks').style.display === 'none') return;

    ctx.fillStyle = 'rgba(0, 0, 0, 0.2)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    rockets.forEach((rocket, index) => {
        rocket.update();
        rocket.draw();
        if (!rocket.alive) {
            rockets.splice(index, 1);
        }
    });

    particles.forEach((particle, index) => {
        if (particle.alpha > 0) {
            particle.update();
            particle.draw();
        } else {
            particles.splice(index, 1);
        }
    });
    requestAnimationFrame(animateFireworks);
}

function startFireworks() {
    canvas.style.display = 'block';
    animateFireworks();
    fireworkTimer = setInterval(() => {
        if (rockets.length < 5) {
            rockets.push(new Rocket());
        }
    }, 400);
}

// Stars & Shooting Stars
let stars = Array.from({ length: 150 }, () => ({ x: Math.random() * innerWidth, y: Math.random() * innerHeight, r: Math.random() * 1.5 }));
let sStars = [];
function drawStars() {
    sx.clearRect(0, 0, innerWidth, innerHeight);
    sx.fillStyle = '#fff';
    stars.forEach(s => {
        sx.globalAlpha = 0.3 + Math.random() * 0.7;
        sx.beginPath(); sx.arc(s.x, s.y, s.r, 0, 7); sx.fill();
    });

    if (Math.random() < 0.015 && sStars.length < 2) {
        sStars.push({
            x: Math.random() * innerWidth + innerWidth / 2,
            y: Math.random() * -100 - 50,
            l: Math.random() * 100 + 80,
            sp: Math.random() * 15 + 15,
            ang: (Math.random() * 15 + 35) * Math.PI / 180,
            op: 1
        });
    }

    for (let i = sStars.length - 1; i >= 0; i--) {
        let s = sStars[i];
        let vx = -Math.cos(s.ang) * s.sp;
        let vy = Math.sin(s.ang) * s.sp;
        s.x += vx; s.y += vy;
        s.op -= 0.01;

        if (s.op <= 0 || s.x < -200 || s.y > innerHeight + 200) { sStars.splice(i, 1); continue; }

        sx.save();
        sx.globalAlpha = Math.max(0, s.op);
        sx.translate(s.x, s.y);
        sx.rotate(Math.atan2(vy, vx));

        const grad = sx.createLinearGradient(0, 0, -s.l, 0);
        grad.addColorStop(0, "rgba(255, 255, 255, 1)");
        grad.addColorStop(0.1, "rgba(6, 182, 212, 1)");
        grad.addColorStop(1, "rgba(79, 70, 229, 0)");

        sx.fillStyle = grad;
        sx.beginPath();
        sx.moveTo(0, -2);
        sx.lineTo(0, 2);
        sx.lineTo(-s.l, 0);
        sx.fill();

        sx.fillStyle = "#fff";
        sx.beginPath(); sx.arc(0, 0, 2, 0, 7); sx.fill();
        sx.restore();
    }

    requestAnimationFrame(drawStars);
}
drawStars();

// Hold Logic
let holding = false, prog = 0;
const holdBtn = document.getElementById('hold-btn');
function startH(e) {
    e.preventDefault();
    holding = true;
    holdBtn.classList.add('holding');
    updateH();
}
function endH() {
    holding = false;
    prog = 0;
    holdBtn.classList.remove('holding');
    const progressBar = document.getElementById('h-progress-bar');
    if (progressBar) progressBar.style.width = '0%';
}
function updateH() {
    if (!holding) return;
    prog += 0.012; // Slightly slowed down to allow enjoying the animation

    // Spawn particles from button center while holding
    const rect = holdBtn.getBoundingClientRect();
    const cx = rect.left + rect.width / 2;
    const cy = rect.top + rect.height / 2;
    for (let i = 0; i < 2; i++) {
        const a = Math.random() * 6.28, s = Math.random() * 5 + 2;
        iparts.push({ x: cx, y: cy, vx: Math.cos(a) * s, vy: Math.sin(a) * s, l: 1 });
    }

    if (prog >= 1) {
        holdBtn.classList.remove('holding');
        openGift();
        return;
    }

    const progressBar = document.getElementById('h-progress-bar');
    if (progressBar) progressBar.style.width = (prog * 100) + '%';
    requestAnimationFrame(updateH);
}


holdBtn.onmousedown = holdBtn.ontouchstart = startH;
window.onmouseup = window.ontouchend = endH;

function openGift() {

    document.getElementById('s-hold').classList.add('off');

function changeScene(i) {
    scene = i;
    document.querySelectorAll('.scene').forEach((s, idx) => s.classList.toggle('active', idx === i));
}


function initScenes() {
    // Float
    const fBox = document.getElementById('sc-float');
    const columns = window.innerWidth < 600 ? 3 : 5;
    const colWidth = 100 / columns;

    IMGS.forEach((src, i) => {
        const colIndex = i % columns;
        setTimeout(() => {
            const el = document.createElement('div'); el.className = 'fp';
            const w = (window.innerWidth < 600 ? 110 : 140) + Math.random() * 50;
            el.style.width = w + 'px';
            el.style.height = w * 1.4 + 'px';

            // Ensure X is within screen bounds [width/2, 100% - width/2]
            const wPct = (w / window.innerWidth) * 100;
            const colCenter = (colIndex * colWidth) + (colWidth / 2);
            const jitter = (Math.random() - 0.5) * (colWidth * 0.7);
            let xPos = colCenter + jitter;

            // Clamping to stay within screen
            xPos = Math.max(wPct / 2 + 2, Math.min(100 - wPct / 2 - 2, xPos));

            el.style.left = xPos + '%';
            el.style.setProperty('--r', (Math.random() - 0.5) * 30 + 'deg');

            const duration = 12 + Math.random() * 4;
            el.style.animation = `rise ${duration}s linear infinite`;

            const img = document.createElement('img'); img.src = src;
            img.style.width = '100%'; img.style.height = '100%'; img.style.objectFit = 'cover';
            el.appendChild(img);
            fBox.appendChild(el);
        }, i * 750);
    });

    // Sphere
    const sWrap = document.getElementById('sphere-wrap');
    const total = 40; // Higher density
    for (let i = 0; i < total; i++) {
        // More balanced Fibonacci sphere distribution
        const phi = Math.acos(-1 + (2 * i + 1) / total);
        const theta = Math.sqrt(total * Math.PI) * phi;

        // Convert angles for CSS
        const rotY = (theta * 180 / Math.PI);
        const rotX = (phi * 180 / Math.PI) - 90;

        const tile = document.createElement('div'); tile.className = 'sphere-tile';
        tile.style.transform = `rotateY(${rotY}deg) rotateX(${rotX}deg) translateZ(210px)`;
        const img = document.createElement('img'); img.src = IMGS[i % IMGS.length];
        img.draggable = false; // Prevent native dragging
        tile.appendChild(img); sWrap.appendChild(tile);
    }
    const grid = document.getElementById('sphere-grid');
    IMGS.forEach((src, i) => {
        const d = document.createElement('div'); d.className = 'grid-photo';
        // Staggered pop-in + infinite bobbing delay
        d.style.animationDelay = `${i * 0.08}s, ${Math.random() * -3}s`;
        const img = document.createElement('img'); img.src = src;
        img.style.width = '100%'; img.style.height = '100%'; img.style.objectFit = 'cover';
        d.appendChild(img); d.onclick = () => openLB(src);
        grid.appendChild(d);
    });
    setTimeout(() => {
        document.getElementById('btn-globe').classList.add('show');
    }, 10000);

    changeScene(0);
    animateSphere();
}

function goToSphere() {
    const btn = document.getElementById('btn-globe');
    btn.style.opacity = '0';
    btn.style.pointerEvents = 'none';

    const photos = document.querySelectorAll('.fp');
    photos.forEach((p, i) => {
        // Stop the rising animation
        const computed = window.getComputedStyle(p);
        const currentMatrix = computed.transform;
        p.style.animation = 'none';
        p.style.transform = currentMatrix; // Freeze at current spot

        // Force reflow
        p.offsetHeight;

        const side = i % 4; // 0: Right, 1: Bottom, 2: Left, 3: Top
        const angle = side * 90 + (Math.random() - 0.5) * 40;
        const dist = Math.max(innerWidth, innerHeight) * 1.5;
        const tx = Math.cos(angle * Math.PI / 180) * dist;
        const ty = Math.sin(angle * Math.PI / 180) * dist;

        p.style.transition = 'transform 1.4s cubic-bezier(0.15, 0, 0.15, 1), opacity 0.8s';
        p.style.transform = `translate(${tx}px, ${ty}px) scale(0.2) rotate(${Math.random() * 720}deg)`;
        p.style.opacity = '0';
    });

    setTimeout(() => {
        changeScene(1);
    }, 1300);
}




let sphereRotY = 0, sphereRotX = 10, sphereScale = 1;
let isDragging = false, lastX, lastY, moveDist = 0;
let velX = 0.2, velY = 0; // Initial velocity for auto-rotate
const sWrap = document.getElementById('sphere-wrap');

function updateSphereTransform() {
    // Re-ordered transforms to prevent distortion: Scale then Rotates
    sWrap.style.transform = `scale(${sphereScale}) rotateX(${sphereRotX}deg) rotateY(${sphereRotY}deg)`;
}

// Interactive & Inertia logic
function animateSphere() {
    if (!isDragging) {
        // Apply inertia/auto-rotate
        sphereRotY += velX;
        sphereRotX += velY;

        // Gentle return to level if not dragging
        velX *= 0.98;
        velY *= 0.98;

        // Base minimum speed
        if (Math.abs(velX) < 0.15) velX = (velX > 0 ? 0.15 : -0.15);

        updateSphereTransform();
    }
    requestAnimationFrame(animateSphere);
}

sWrap.onmousedown = (e) => {
    if (e.cancelable) e.preventDefault();
    isDragging = true;
    lastX = e.clientX;
    lastY = e.clientY;
    moveDist = 0;
    velX = 0; velY = 0;
};

sWrap.addEventListener('touchstart', (e) => {
    isDragging = true;
    lastX = e.touches[0].clientX;
    lastY = e.touches[0].clientY;
    moveDist = 0;
    velX = 0; velY = 0;
    if (scene === 1 && e.cancelable) e.preventDefault();
}, { passive: false });

window.onblur = () => { isDragging = false; };

window.onmousemove = (e) => {
    if (!isDragging) return;
    const dx = (e.clientX - lastX) * 0.3;
    const dy = (e.clientY - lastY) * 0.3;

    sphereRotY += dx;
    sphereRotX -= dy;
    sphereRotX = Math.max(-80, Math.min(80, sphereRotX));

    velX = dx; // Store for inertia
    velY = -dy;

    lastX = e.clientX;
    lastY = e.clientY;
    moveDist += Math.abs(dx) + Math.abs(dy);
    updateSphereTransform();
};

window.ontouchmove = (e) => {
    if (!isDragging) return;
    const dx = (e.touches[0].clientX - lastX) * 0.4;
    const dy = (e.touches[0].clientY - lastY) * 0.4;

    sphereRotY += dx;
    sphereRotX -= dy;
    sphereRotX = Math.max(-80, Math.min(80, sphereRotX));

    velX = dx;
    velY = -dy;

    lastX = e.touches[0].clientX;
    lastY = e.touches[0].clientY;
    moveDist += Math.abs(dx) + Math.abs(dy);
    updateSphereTransform();
};

window.onmouseup = window.ontouchend = () => {
    endH(); // Stop the hold button progress
    // If movement was very small, treat as a "tap" to explode the sphere
    if (isDragging && moveDist < 10) {
        explodeSphere();
    }
    isDragging = false;
};

window.addEventListener('wheel', (e) => {
    if (scene !== 1) return;
    // Allow scrolling if the grid is showing
    if (document.getElementById('sphere-grid').classList.contains('show')) return;

    if (e.cancelable) e.preventDefault();
    const delta = e.deltaY * -0.0008;
    sphereScale += delta;
    sphereScale = Math.max(0.6, Math.min(1.6, sphereScale));
    updateSphereTransform();
}, { passive: false });

function explodeSphere() {
    const grid = document.getElementById('sphere-grid');
    grid.classList.remove('show');
    void grid.offsetWidth; // Force reflow to reset animation
    document.getElementById('sphere-wrap').style.display = 'none';
    grid.classList.add('show');
    // Need a tiny delay for browser to apply "display: flex" before we can modify scroll
    setTimeout(() => { grid.scrollTop = 0; }, 10);
    document.getElementById('back-btn').style.display = 'block';
}

function collapse() {
    document.getElementById('sphere-wrap').style.display = 'block';
    document.getElementById('sphere-grid').classList.remove('show');
    document.getElementById('back-btn').style.display = 'none';
    updateSphereTransform();
}

let curI = 0;
function openLB(src) {
    curI = IMGS.indexOf(src);
    const lb = document.getElementById('lb');
    document.getElementById('lb-img').src = src;
    lb.style.display = 'flex';
    setTimeout(() => lb.classList.add('show'), 10);
}

function closeLB() {
    const lb = document.getElementById('lb');
    lb.classList.remove('show');
    setTimeout(() => lb.style.display = 'none', 400);
}
function changeImg(n) {
    curI = (curI + n + IMGS.length) % IMGS.length;
    document.getElementById('lb-img').src = IMGS[curI];
}

let reactInterval, reactCount = 0;
function spawnReaction(emoji, x, y) {
    const el = document.createElement('div');
    el.className = 'floating-react';
    el.innerText = emoji;
    el.style.left = `${x}px`;
    el.style.top = `${y}px`;
    el.style.setProperty('--dx', (Math.random() * 160 - 80) + 'px');
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 1500);

    reactCount++;
    if (reactCount === 10) spawnEmojiRain(emoji);
}

function spawnEmojiRain(emoji) {
    const rainInt = setInterval(() => {
        const el = document.createElement('div');
        el.className = 'falling-emoji';
        el.innerText = emoji;
        el.style.left = Math.random() * 100 + 'vw';
        el.style.fontSize = (Math.random() * 1 + 1.5) + 'rem';
        document.body.appendChild(el);
        setTimeout(() => el.remove(), 3000);
    }, 50);
    setTimeout(() => clearInterval(rainInt), 3000);
}

function startReact(emoji, e) {
    if (e) e.preventDefault();
    const rect = e.currentTarget.getBoundingClientRect();
    const x = rect.left + rect.width / 2;
    const y = rect.top;

    reactCount = 0;
    spawnReaction(emoji, x, y);
    clearInterval(reactInterval);
    reactInterval = setInterval(() => spawnReaction(emoji, x, y), 100);
}

function stopReact() {
    clearInterval(reactInterval);
    reactCount = 0;
}


// Fireworks
let fwps = [];
function fireworks() {
    for (let i = 0; i < 5; i++) setTimeout(() => {
        const x = Math.random() * innerWidth, y = Math.random() * innerHeight * 0.5, c = COLORS[Math.floor(Math.random() * 4)];
        for (let j = 0; j < 40; j++) {
            const a = Math.random() * 6.28, s = Math.random() * 5 + 2;
            fwps.push({ x, y, vx: Math.cos(a) * s, vy: Math.sin(a) * s, l: 1, c });
        }
    }, i * 400);
}
function drawFW() {
    fwx.clearRect(0, 0, innerWidth, innerHeight);
    fwps = fwps.filter(p => p.l > 0);
    fwps.forEach(p => { p.x += p.vx; p.y += p.vy; p.vy += 0.1; p.l -= 0.015; fwx.globalAlpha = p.l; fwx.fillStyle = p.c; fwx.beginPath(); fwx.arc(p.x, p.y, 2, 0, 7); fwx.fill(); });
    requestAnimationFrame(drawFW);
}
drawFW();

// Interaction
let iparts = [];
window.onclick = (e) => {
    if (e.target.closest('button, .fp, .grid-photo')) return;
    for (let i = 0; i < 8; i++) {
        const a = Math.random() * 6.28, s = Math.random() * 4 + 1;
        iparts.push({ x: e.clientX, y: e.clientY, vx: Math.cos(a) * s, vy: Math.sin(a) * s, l: 1 });
    }
};
function drawIP() {
    px.clearRect(0, 0, innerWidth, innerHeight);
    iparts = iparts.filter(p => p.l > 0);
    iparts.forEach(p => { p.x += p.vx; p.y += p.vy; p.vy += 0.05; p.l -= 0.02; px.globalAlpha = p.l; px.fillStyle = '#06b6d4'; px.beginPath(); px.arc(p.x, p.y, 1.5, 0, 7); px.fill(); });
    requestAnimationFrame(drawIP);
}
drawIP();

let audio = document.getElementById('bgMusic');
if (audio) audio.loop = true;

function startMusic() { if (audio) audio.play().catch(() => { }); }
